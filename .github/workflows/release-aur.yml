name: Release AUR

on:
  workflow_call:
    inputs:
      tag:
        description: 'Git tag to publish (e.g. v1.2.3)'
        required: true
        type: string
    secrets:
      AUR_SSH_KEY:
        description: 'SSH private key for the AUR account'
        required: true

jobs:
  aur:
    name: Push ${{ matrix.package }} to AUR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [unbill-cli-bin, unbill-tui-bin]

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_KEY }}

      - name: Add AUR to known hosts
        run: ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Clone AUR package repo
        run: git clone ssh://aur@aur.archlinux.org/${{ matrix.package }}.git aur-pkg

      - name: Update PKGBUILD
        working-directory: aur-pkg
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          updpkgsums

      - name: Regenerate .SRCINFO
        working-directory: aur-pkg
        run: makepkg --printsrcinfo > .SRCINFO

      - name: Commit and push
        working-directory: aur-pkg
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ inputs.tag }}"
          git push
