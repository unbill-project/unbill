name: Release AUR

on:
  workflow_call:
    inputs:
      tag:
        description: 'Git tag to publish (e.g. v1.2.3)'
        required: true
        type: string
      packages:
        description: 'JSON array of AUR package names (e.g. ["unbill-cli-bin","unbill-tui-bin"])'
        required: true
        type: string
    secrets:
      AUR_SSH_KEY:
        description: 'SSH private key for the AUR account'
        required: true

jobs:
  aur:
    name: Push ${{ matrix.package }} to AUR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJSON(inputs.packages) }}

    steps:
      - uses: actions/checkout@v4

      - name: Update pkgver in PKGBUILD
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          VERSION="${VERSION//-/.}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" .github/aur/${{ matrix.package }}/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" .github/aur/${{ matrix.package }}/PKGBUILD

      - name: Release ${{ matrix.package }} to AUR
        uses: jbouter/aur-releaser@v0.0.8
        with:
          pkgname: ${{ matrix.package }}
          pkgbuild: .github/aur/${{ matrix.package }}/PKGBUILD
          commit_username: github-actions[bot]
          commit_email: github-actions[bot]@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: Update to ${{ inputs.tag }}
          ssh_keyscan_types: rsa,ecdsa,ed25519
