name: Release AUR

on:
  workflow_call:
    inputs:
      tag:
        description: 'Git tag to publish (e.g. v1.2.3)'
        required: true
        type: string
    secrets:
      AUR_SSH_KEY:
        description: 'SSH private key for the AUR account'
        required: true

jobs:
  aur:
    name: Push ${{ matrix.package }} to AUR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - package: unbill-cli-bin
            pkgbuild: .github/aur/unbill-cli-bin/PKGBUILD
          - package: unbill-tui-bin
            pkgbuild: .github/aur/unbill-tui-bin/PKGBUILD

    steps:
      - uses: actions/checkout@v4

      - name: Update pkgver in PKGBUILD
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          VERSION="${VERSION//-/.}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" ${{ matrix.pkgbuild }}
          sed -i "s/^pkgrel=.*/pkgrel=1/" ${{ matrix.pkgbuild }}

      - name: Release ${{ matrix.package }} to AUR
        uses: jbouter/aur-releaser@v0.0.8
        with:
          pkgname: ${{ matrix.package }}
          pkgbuild: ${{ matrix.pkgbuild }}
          commit_username: github-actions[bot]
          commit_email: github-actions[bot]@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: Update to ${{ inputs.tag }}
          ssh_keyscan_types: rsa,ecdsa,ed25519
