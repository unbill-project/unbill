name: Build

on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p unbill-cli -p unbill-tui

      - name: Stage binaries (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/unbill-cli unbill-cli-${{ matrix.suffix }}
          cp target/${{ matrix.target }}/release/unbill-tui unbill-tui-${{ matrix.suffix }}

      - name: Stage binaries (windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/unbill-cli.exe unbill-cli-${{ matrix.suffix }}.exe
          cp target/${{ matrix.target }}/release/unbill-tui.exe unbill-tui-${{ matrix.suffix }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: |
            unbill-cli-${{ matrix.suffix }}*
            unbill-tui-${{ matrix.suffix }}*

  build-tauri:
    name: Build Tauri (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x86_64
          - os: macos-latest
            suffix: macos-aarch64
          - os: windows-latest
            suffix: windows-x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Install tauri-cli
        run: npm install -g @tauri-apps/cli

      - id: tauri
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: crates/unbill-tauri
          tauriScript: tauri

      - name: Rename artifacts
        shell: bash
        run: |
          echo '${{ steps.tauri.outputs.artifactPaths }}' | jq -r '.[]' | tr -d '\r' | while read -r path; do
            ext="${path##*.}"
            mv "$path" "unbill-${{ matrix.suffix }}.${ext}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-tauri-${{ matrix.suffix }}
          path: unbill-${{ matrix.suffix }}.*

  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and SDK components
        run: sdkmanager "ndk;26.1.10909125" "build-tools;35.0.0" "platforms;android-36"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          key: android

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Install tauri-cli
        run: npm install -g @tauri-apps/cli

      - name: Build APK (arm64 + armv7)
        run: tauri android build --apk --target aarch64 --target armv7
        working-directory: crates/unbill-tauri

      - name: Build AAB
        run: tauri android build --aab
        working-directory: crates/unbill-tauri

      - name: Stage artifacts
        run: |
          cp crates/unbill-tauri/gen/android/app/build/outputs/apk/arm64/release/app-arm64-release-unsigned.apk unbill-android-arm64.apk
          cp crates/unbill-tauri/gen/android/app/build/outputs/apk/arm/release/app-arm-release-unsigned.apk unbill-android-armv7.apk
          cp crates/unbill-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab unbill-android.aab

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-tauri-android-arm64
          path: unbill-android-arm64.apk

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-tauri-android-armv7
          path: unbill-android-armv7.apk

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-tauri-android
          path: unbill-android.aab
