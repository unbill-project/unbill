name: Build

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p unbill-cli -p unbill-tui

      - name: Stage binaries (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/unbill-cli unbill-cli-${{ matrix.suffix }}
          cp target/${{ matrix.target }}/release/unbill-tui unbill-tui-${{ matrix.suffix }}

      - name: Stage binaries (windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/unbill-cli.exe unbill-cli-${{ matrix.suffix }}.exe
          cp target/${{ matrix.target }}/release/unbill-tui.exe unbill-tui-${{ matrix.suffix }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: |
            unbill-cli-${{ matrix.suffix }}*
            unbill-tui-${{ matrix.suffix }}*

  build-tauri:
    name: Build Tauri (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x86_64
          - os: macos-latest
            suffix: macos-aarch64
          - os: windows-latest
            suffix: windows-x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Install tauri-cli
        run: npm install -g @tauri-apps/cli

      - id: tauri
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: crates/unbill-tauri
          tauriScript: tauri

      - name: Rename artifacts
        shell: bash
        run: |
          echo '${{ steps.tauri.outputs.artifactPaths }}' | jq -r '.[]' | while read -r path; do
            ext="${path##*.}"
            mv "$path" "unbill-${{ matrix.suffix }}.${ext}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-tauri-${{ matrix.suffix }}
          path: unbill-${{ matrix.suffix }}.*
