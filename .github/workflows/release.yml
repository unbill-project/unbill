name: Release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Git tag (e.g. nightly-20260422-000000, v1.2.3)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      body:
        description: 'Release description'
        required: false
        type: string
        default: ''
      aur_packages:
        description: 'JSON array of AUR package names to publish (e.g. ["unbill-cli-bin","unbill-tui-bin"])'
        required: false
        type: string
        default: '[]'
    secrets:
      AUR_SSH_KEY:
        required: false

jobs:
  github:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          make_latest: ${{ !inputs.prerelease }}
          body: ${{ inputs.body }}
          files: unbill-*

  aur:
    name: Publish AUR release
    if: inputs.aur_packages != '[]' && inputs.aur_packages != ''
    uses: ./.github/workflows/release-aur.yml
    with:
      tag: ${{ inputs.tag }}
      packages: ${{ inputs.aur_packages }}
    secrets: inherit
