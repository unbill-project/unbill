name: Nightly

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ts.outputs.tag }}
    steps:
      - id: ts
        run: echo "tag=nightly-$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    uses: ./.github/workflows/build-release.yml
    with:
      tag: ${{ needs.prepare.outputs.tag }}
      prerelease: true
      body: Automated nightly build from `main`. Not guaranteed to be stable.
    permissions:
      contents: write
